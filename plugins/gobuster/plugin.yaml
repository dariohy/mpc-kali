apiVersion: mcp-kali/v1
kind: Plugin
metadata:
  id: org.mcp-kali.gobuster
  name: Gobuster
  version: 2.0.0
  description: Bounded Gobuster web-content, DNS, virtual-host, and fuzz discovery profiles.
categories: [web-application, information-gathering]
tags: [content-discovery, dns, virtual-hosts, fuzzing]
requires:
  commands: [gobuster]
tools:
  - metadata:
      name: gobuster_content_discovery
      description: Discover one level of directories and files on an authorized HTTP(S) base URL using an absolute wordlist path.
      categories: [web-application, information-gathering]
      tags: [directories, files, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [url, wordlist]
      properties:
        url: {$ref: "#/$defs/url"}
        wordlist: {$ref: "#/$defs/wordlist"}
      $defs:
        url:
          type: string
          minLength: 9
          maxLength: 2048
          pattern: "^https?://[A-Za-z0-9\\[][A-Za-z0-9.:_%\\[\\]-]{0,252}(/[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*)?$"
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [dir, -u, "{{url}}", -w, "{{wordlist}}", -t, "10", --no-progress, --no-color]
    policy:
      timeout_seconds: 1800
  - metadata:
      name: gobuster_extension_discovery
      description: Discover paths with a bounded comma-separated extension set on one authorized HTTP(S) base URL.
      categories: [web-application, information-gathering]
      tags: [directories, files, extensions, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [url, wordlist, extensions]
      properties:
        url: {$ref: "#/$defs/url"}
        wordlist: {$ref: "#/$defs/wordlist"}
        extensions:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9]{1,12}(,[A-Za-z0-9]{1,12}){0,9}$"
      $defs:
        url:
          type: string
          minLength: 9
          maxLength: 2048
          pattern: "^https?://[A-Za-z0-9\\[][A-Za-z0-9.:_%\\[\\]-]{0,252}(/[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*)?$"
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [dir, -u, "{{url}}", -w, "{{wordlist}}", -x, "{{extensions}}", -t, "10", --no-progress, --no-color]
    policy:
      timeout_seconds: 1800
  - metadata:
      name: gobuster_dns_discovery
      description: Discover subdomains beneath one authorized base domain using an absolute wordlist path.
      categories: [information-gathering]
      tags: [dns, subdomains, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [domain, wordlist]
      properties:
        domain:
          type: string
          minLength: 1
          maxLength: 253
          pattern: "^[A-Za-z0-9][A-Za-z0-9.-]{0,252}$"
        wordlist: {$ref: "#/$defs/wordlist"}
      $defs:
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [dns, -d, "{{domain}}", -w, "{{wordlist}}", -i, -t, "10", --no-progress, --no-color]
    policy:
      timeout_seconds: 1800
  - metadata:
      name: gobuster_vhost_discovery
      description: Discover named virtual hosts on one authorized HTTP(S) endpoint and base domain.
      categories: [web-application, information-gathering]
      tags: [virtual-hosts, host-header, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [url, domain, wordlist]
      properties:
        url: {$ref: "#/$defs/url"}
        domain:
          type: string
          minLength: 1
          maxLength: 253
          pattern: "^[A-Za-z0-9][A-Za-z0-9.-]{0,252}$"
        wordlist: {$ref: "#/$defs/wordlist"}
      $defs:
        url:
          type: string
          minLength: 9
          maxLength: 2048
          pattern: "^https?://[A-Za-z0-9\\[][A-Za-z0-9.:_%\\[\\]-]{0,252}(/[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*)?$"
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [vhost, -u, "{{url}}", -w, "{{wordlist}}", --append-domain, --domain, "{{domain}}", -t, "10", --no-progress, --no-color]
    policy:
      timeout_seconds: 1800
  - metadata:
      name: gobuster_fuzz_discovery
      description: Substitute an absolute wordlist into one FUZZ marker in an authorized HTTP(S) URL.
      categories: [web-application, information-gathering]
      tags: [fuzzing, paths, parameters, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [url, wordlist]
      properties:
        url:
          type: string
          minLength: 13
          maxLength: 2048
          pattern: "^https?://[A-Za-z0-9\\[][A-Za-z0-9.:_%\\[\\]-]{0,252}/[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*FUZZ[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*$"
        wordlist: {$ref: "#/$defs/wordlist"}
      $defs:
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [fuzz, -u, "{{url}}", -w, "{{wordlist}}", -t, "10", --no-progress, --no-color]
    policy:
      timeout_seconds: 1800
  - metadata:
      name: gobuster_rate_limited_discovery
      description: Discover one content level with five workers and a 200 ms delay for a more controlled request rate.
      categories: [web-application, information-gathering]
      tags: [directories, files, rate-limited, wordlist]
    input_schema:
      type: object
      additionalProperties: false
      required: [url, wordlist]
      properties:
        url: {$ref: "#/$defs/url"}
        wordlist: {$ref: "#/$defs/wordlist"}
      $defs:
        url:
          type: string
          minLength: 9
          maxLength: 2048
          pattern: "^https?://[A-Za-z0-9\\[][A-Za-z0-9.:_%\\[\\]-]{0,252}(/[A-Za-z0-9._~!$&'()*+,;=:@%/?#-]*)?$"
        wordlist:
          type: string
          minLength: 2
          maxLength: 4096
          pattern: "^/[^\\r\\n]+$"
    execution:
      program: gobuster
      args: [dir, -u, "{{url}}", -w, "{{wordlist}}", -t, "5", --delay, 200ms, --no-progress, --no-color]
    policy:
      timeout_seconds: 3600
