<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MCP Kali Job Control</title>
  <style>
    :root { color-scheme: dark; font: 14px/1.45 system-ui, sans-serif; background: #0b1014; color: #dce7ec; --accent-green:#3CB335; --accent-blue:#006DC7; }
    body { max-width: 1380px; margin: 32px auto; padding: 0 22px; }
    h1 { margin: 0; color: var(--accent-green); font-size: 26px; } .muted { color: #9aabb6; }
    header, .tabs, .job-actions, .details-head, .stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    header { justify-content: space-between; margin-bottom: 18px; } .stats { justify-content: flex-end; }
    .stat { border: 1px solid #2d3b45; border-radius: 7px; padding: 5px 10px; background:#121c23; }
    button { border: 1px solid #38634d; border-radius: 6px; background: #173b2c; color: #cef9df; padding: 6px 10px; cursor: pointer; }
    button:hover { background: #20543c; } button.danger { border-color: #803b42; background: #4f2027; color: #ffd6d6; }
    button.danger:hover { background:#6b2730; } button.secondary { border-color:#405564; background:#18262e; color:#dce7ec; }
    button.tab { border-color: transparent; background: transparent; color:#9aabb6; border-radius:0; padding:10px 14px; }
    button.tab.active { color:var(--accent-green); border-bottom:2px solid var(--accent-green); }
    .panel { display: none; } .panel.active { display:block; }
    .summary { margin: 15px 0; color:#9aabb6; }
    .job { border: 1px solid #293942; border-radius: 8px; background: #10191f; margin: 7px 0; overflow:hidden; }
    .row { display:grid; grid-template-columns: 32px 84px minmax(80px, .6fr) minmax(150px, 2.4fr) 64px auto auto; gap:8px; padding: 8px 10px; align-items:center; }
    .row:hover { background:#142129; } .queue { color:#c6d6df; } .tool { font-weight:650; }
    code { font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
    .state { font-weight:700; text-transform:uppercase; font-size:11px; letter-spacing:.04em; }
    .running { color:#ffd166; }.paused { color:#b6a7ff; }.queued { color:var(--accent-blue); }.succeeded { color:var(--accent-green); }
    .failed,.timed_out,.interrupted,.cancelled { color:#ff9292; }
    .job-actions { gap:6px; flex-wrap:nowrap; } .job-actions button, .expand { font-size:12px; padding:4px 7px; }
    .expand { min-width:27px; padding:3px 6px; font-size:15px; line-height:1; white-space:nowrap; }
    .detail { display:none; border-top:1px solid #293942; padding: 12px; grid-template-columns: minmax(240px,1fr) minmax(300px,2fr); gap:12px; }
    .detail.open { display:grid; }
    .metadata { background:#0c1419; border:1px solid #293942; border-radius:6px; padding:10px; word-break:break-word; }
    .metadata div { margin:5px 0; } pre { margin:0; background:#090f13; border:1px solid #293942; padding:10px; border-radius:6px; overflow:auto; max-height:330px; white-space:pre-wrap; color:#c8d9e2; }
    code.full-command { margin-top:5px; white-space:pre-wrap; overflow:visible; text-overflow:clip; overflow-wrap:anywhere; max-height:160px; }
    .output-title { margin:0 0 5px; color:#9aabb6; font-size:12px; } .output-title a { color:var(--accent-blue); text-decoration:none; margin-left:8px; } .output-title a:hover { text-decoration:underline; } .output-warning { margin:0 0 8px; color:#ffd166; font-size:12px; } .empty { padding:32px; text-align:center; color:#9aabb6; }
    #notice { min-height:20px; color:#ffb4b4; } .refresh { color:#9aabb6; font-size:12px; }
    a.runtime-link { color:var(--accent-blue); text-decoration:none; } a.runtime-link:hover { text-decoration:underline; }
    .runtime-summary { margin:15px 0; color:#9aabb6; } .runtime-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:10px; }
    .runtime-card { border:1px solid #293942; border-radius:8px; background:#10191f; padding:12px; } .runtime-card h2 { margin:0; font-size:16px; }
    .runtime-card p { margin:7px 0; } .runtime-card code { display:inline; white-space:normal; overflow-wrap:anywhere; }
    .runtime-status { font-weight:700; font-size:11px; letter-spacing:.04em; text-transform:uppercase; } .available { color:var(--accent-green); } .unavailable { color:#ff9292; } .root-required { color:#ffd166; } .disabled { color:#ff9292; }
    .catalog-toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:12px 0; padding:10px; border:1px solid #293942; border-radius:8px; background:#0f181e; }
    .catalog-toolbar input, .catalog-toolbar select { min-width:190px; border:1px solid #405564; border-radius:6px; background:#0b1217; color:#dce7ec; padding:7px 9px; }
    .catalog-toolbar input { flex:1; min-width:240px; } .catalog-count { margin-left:auto; color:#9aabb6; font-size:12px; }
    .catalog-list { display:grid; gap:8px; } [hidden] { display:none !important; }
    details.plugin-card { padding:0; overflow:hidden; } details.plugin-card summary { display:flex; align-items:center; gap:8px; cursor:pointer; padding:11px 12px; list-style:none; }
    details.plugin-card summary::-webkit-details-marker { display:none; } details.plugin-card summary::before { content:'›'; color:var(--accent-blue); font-size:19px; line-height:1; transition:transform .12s ease; }
    details.plugin-card[open] summary::before { transform:rotate(90deg); } .plugin-title { font-weight:700; font-size:15px; } .plugin-count { margin-left:auto; color:#9aabb6; white-space:nowrap; }
    .plugin-body { border-top:1px solid #293942; padding:10px 12px 12px; } .plugin-meta { color:#9aabb6; margin:0 0 8px; }
    .tool-list { list-style:none; margin:8px 0 0; padding:0; border:1px solid #293942; border-radius:6px; overflow:hidden; }
    .tool-list li { display:grid; grid-template-columns:minmax(180px,.8fr) minmax(260px,2fr); gap:10px; padding:8px 10px; border-top:1px solid #293942; } .tool-list li:first-child { border-top:0; }
    .tool-list li:hover { background:#142129; } .tool-description { color:#9aabb6; }
    .diagnostics { margin-top:18px; } .diagnostic-card { border-color:#653b42; background:#24171c; } .diagnostic-card h2 { color:#ffb4b4; }
    .diagnostics summary { cursor:pointer; color:#c8d9e2; } .diagnostics > summary h2 { display:inline; font-size:16px; }
    .reference-layout { display:grid; grid-template-columns:minmax(280px,.75fr) minmax(420px,2fr); gap:12px; align-items:start; }
    .reference-index { display:grid; gap:5px; max-height:72vh; overflow:auto; padding-right:4px; }
    button.reference-item { width:100%; text-align:left; border-color:#293942; background:#10191f; color:#dce7ec; padding:9px 10px; }
    button.reference-item:hover { background:#142129; } button.reference-item.selected { border-color:var(--accent-green); background:#14251d; }
    .reference-title { display:block; font-weight:700; } .reference-meta { display:block; margin-top:3px; color:#9aabb6; font-size:12px; overflow-wrap:anywhere; }
    .reference-document { min-height:240px; position:sticky; top:12px; } .reference-document pre { max-height:70vh; }
    @media (max-width: 850px) { .row { grid-template-columns: 34px 82px minmax(80px,1fr) auto; } .command,.elapsed { display:none; } .detail,.reference-layout { grid-template-columns:1fr; } .reference-document { position:static; } .reference-index { max-height:42vh; } .tool-list li { grid-template-columns:1fr; } .catalog-count { width:100%; margin-left:0; } }
  </style>
</head>
<body>
  <header>
    <div><h1>MCP Kali job control</h1><div class="muted">Live scheduler monitor and declarative Plugin runtime · <a class="runtime-link" href="/api/plugins">Plugins</a> · <a class="runtime-link" href="/api/capabilities">Capabilities</a> · <a class="runtime-link" href="/api/references">References</a> · <a class="runtime-link" href="/api/plugins/diagnostics">Diagnostics</a></div></div>
    <div class="stats" id="stats"></div>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="active">Active &amp; queue</button>
    <button class="tab" data-tab="history">Finished history</button>
    <button class="tab" data-tab="tools">Tools</button>
    <button class="tab" data-tab="references">References</button>
    <button class="secondary" onclick="load()">Refresh now</button>
    <button class="secondary" id="auto-refresh" onclick="toggleAutoRefresh()">Start auto-refresh</button>
    <span class="refresh" id="refresh"></span>
  </div>
  <p id="notice"></p>
  <section class="panel active" id="active"></section>
  <section class="panel" id="history"></section>
  <section class="panel" id="tools"></section>
  <section class="panel" id="references"></section>
<script>
  const activeStates = new Set(['queued','running','paused']);
  let jobs = [], runtime = {plugins:0,tools:0,references:0,diagnostics:0}, plugins = [], toolDefinitions = [], diagnostics = [], references = [], referenceDiagnostics = [], selectedReference = null, selectedReferenceId = null, toolQuery = '', toolPluginFilter = 'all', referenceQuery = '', referencePluginFilter = 'all', currentTab = 'active', autoRefreshEnabled = false, autoRefreshTimer = null, lastUpdated = null, loading = false, listSignature = null;
  const expandedJobs = new Set();
  const activePanel = document.getElementById('active');
  const historyPanel = document.getElementById('history');
  const toolsPanel = document.getElementById('tools');
  const referencesPanel = document.getElementById('references');
  const statsEl = document.getElementById('stats');
  const refreshEl = document.getElementById('refresh');
  const noticeEl = document.getElementById('notice');
  const autoRefreshButton = document.getElementById('auto-refresh');
  const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const elapsed = job => { const start = new Date(job.started_at || job.created_at), end = job.finished_at ? new Date(job.finished_at) : new Date(); const seconds = Math.max(0, Math.floor((end-start)/1000)); const h=Math.floor(seconds/3600), m=Math.floor(seconds%3600/60), s=seconds%60; return (h ? `${h}h ` : '') + (m ? `${m}m ` : '') + `${s}s`; };
  const date = value => value ? new Date(value).toLocaleString() : '—';
  const size = value => { const bytes = Number(value || 0); if (bytes < 1024) return `${bytes} B`; if (bytes < 1024*1024) return `${(bytes/1024).toFixed(1)} KiB`; if (bytes < 1024*1024*1024) return `${(bytes/1024/1024).toFixed(1)} MiB`; return `${(bytes/1024/1024/1024).toFixed(1)} GiB`; };
  const analysisArtifacts = job => (job.analysis_artifacts || []).length ? (job.analysis_artifacts || []).map(artifact => `<div><code>${esc(artifact.kind)}</code> ${esc(artifact.path)}</div>`).join('') : '—';
  function actionButtons(job) {
    if (job.state === 'running') return `<button onclick="act('${job.id}','pause')">Pause</button><button class="danger" onclick="act('${job.id}','kill')">Kill</button>`;
    if (job.state === 'paused') return `<button onclick="act('${job.id}','resume')">Resume</button><button class="danger" onclick="act('${job.id}','kill')">Kill</button>`;
    if (job.state === 'queued') return `<button class="danger" onclick="act('${job.id}','kill')">Remove</button>`;
    return '';
  }
  function jobCard(job, position) {
    const order = job.state === 'queued' ? `#${position}` : '—';
    const open = expandedJobs.has(job.id);
    return `<article class="job"><div class="row"><button class="secondary expand" aria-expanded="${open}" aria-label="${open ? 'Collapse' : 'Expand'} job details" title="${open ? 'Collapse' : 'Expand'} details" onclick="toggleDetails('${job.id}')">${open ? '⌄' : '&gt;'}</button><span class="state ${esc(job.state)}">${order === '—' ? '' : `${order} `}${esc(job.state)}</span><span class="tool">${esc(job.tool)}</span><code class="command" title="${esc(job.command)}">${esc(job.command)}</code><span class="elapsed" data-elapsed="${job.id}">${elapsed(job)}</span><span class="job-actions">${actionButtons(job)}</span></div><div class="detail${open ? ' open' : ''}" id="detail-${job.id}"><div class="metadata">Loading…</div><div><p class="output-title">Last 50 stdout lines</p><pre>Loading…</pre></div></div></article>`;
  }
  function toggleDetails(id) {
    const detail = document.getElementById(`detail-${id}`);
    const button = detail?.closest('.job')?.querySelector('.expand');
    if (!detail || !button) return;
    const open = !expandedJobs.has(id);
    if (open) { expandedJobs.add(id); detail.classList.add('open'); detailsFor(id); }
    else { expandedJobs.delete(id); detail.classList.remove('open'); }
    button.setAttribute('aria-expanded', String(open));
    button.textContent = open ? '⌄' : '>';
  }
  function refreshElapsed() { jobs.forEach(job => document.querySelectorAll(`[data-elapsed="${job.id}"]`).forEach(node => { node.textContent = elapsed(job); })); }
  function refreshStatus() {
    autoRefreshButton.textContent = autoRefreshEnabled ? 'Stop auto-refresh' : 'Start auto-refresh';
    const updated = lastUpdated ? ` · Updated ${lastUpdated.toLocaleTimeString()}` : '';
    refreshEl.textContent = `${autoRefreshEnabled ? 'Auto-refreshing every 5 seconds' : 'Auto-refresh stopped'}${updated}`;
  }
  function values(values) { return Array.isArray(values) && values.length ? values.map(esc).join(', ') : 'None'; }
  function elevationBadge(tool) {
    const elevation = tool._meta?.elevation;
    if (!elevation || elevation.status === 'not_required') return '';
    const enabled = tool._meta?.enabled !== false;
    const label = enabled ? `root · ${elevation.status.replaceAll('_', ' ')}` : 'disabled · elevation unavailable';
    const detail = elevation.message ? ` title="${esc(elevation.message)}"` : '';
    return ` <span class="runtime-status ${enabled ? 'root-required' : 'disabled'}"${detail}>${esc(label)}</span>`;
  }
  function renderTools() {
    const byPlugin = new Map();
    for (const tool of toolDefinitions) {
      const pluginId = tool._meta?.plugin_id || 'unknown';
      if (!byPlugin.has(pluginId)) byPlugin.set(pluginId, []);
      byPlugin.get(pluginId).push(tool);
    }
    const pluginOptions = [...plugins].sort((a,b) => a.name.localeCompare(b.name)).map(plugin => `<option value="${esc(plugin.id)}"${toolPluginFilter === plugin.id ? ' selected' : ''}>${esc(plugin.name)}</option>`).join('');
    const available = [...plugins].sort((a,b) => a.name.localeCompare(b.name)).map(plugin => {
      const tools = byPlugin.get(plugin.id) || [];
      const requirements = plugin.requirements?.commands || [];
      const pluginSearch = `${plugin.id} ${plugin.name} ${plugin.description || ''} ${plugin.source || ''}`.toLowerCase();
      return `<details class="runtime-card plugin-card" data-plugin="${esc(plugin.id)}" data-search="${esc(pluginSearch)}"><summary><span class="runtime-status available">Available</span><span class="plugin-title">${esc(plugin.name)} <span class="muted">${esc(plugin.version)}</span></span><span class="plugin-count">${tools.length} tool${tools.length === 1 ? '' : 's'}</span></summary><div class="plugin-body"><p class="plugin-meta"><code>${esc(plugin.id)}</code> · ${esc(plugin.source)}</p><p>${esc(plugin.description || 'No description.')}</p><p><b>Required commands:</b> ${values(requirements)}</p><ul class="tool-list">${tools.map(tool => `<li data-search="${esc(`${tool.name} ${tool.description || ''}`.toLowerCase())}"><span><code>${esc(tool.name)}</code>${elevationBadge(tool)}</span><span class="tool-description">${esc(tool.description)}</span></li>`).join('') || '<li class="muted">No tools registered.</li>'}</ul></div></details>`;
    }).join('');
    const unavailable = diagnostics.map(diagnostic => `<article class="runtime-card diagnostic-card"><span class="runtime-status unavailable">Unavailable</span><h2>${esc(diagnostic.plugin_id || diagnostic.tool_name || 'Plugin definition')}</h2><p><b>Layer:</b> ${esc(diagnostic.layer)} · <code>${esc(diagnostic.path)}</code></p><p>${esc(diagnostic.message)}</p></article>`).join('') || '<div class="empty">No Plugin diagnostics. All discovered definitions are available.</div>';
    toolsPanel.innerHTML = `<p class="runtime-summary">Tools are grouped by Plugin. Search by tool, Plugin, or description, then expand only the groups you need.</p><div class="catalog-toolbar"><input id="tool-search" type="search" value="${esc(toolQuery)}" placeholder="Search tools and Plugins…" aria-label="Search tools and Plugins" oninput="toolQuery=this.value; filterToolCatalog()"><select id="tool-plugin-filter" aria-label="Filter tools by Plugin" onchange="toolPluginFilter=this.value; filterToolCatalog()"><option value="all">All Plugins</option>${pluginOptions}</select><span class="catalog-count" id="tool-count"></span></div><div class="catalog-list" id="tool-catalog">${available}</div><div class="empty" id="tool-empty" hidden>${plugins.length ? 'No tools match this filter.' : 'No Plugins are registered.'}</div><details class="diagnostics"><summary><h2>Unavailable definitions and diagnostics (${diagnostics.length})</h2></summary><div class="runtime-grid">${unavailable}</div></details>`;
    filterToolCatalog();
  }
  function filterToolCatalog() {
    const query = toolQuery.trim().toLowerCase();
    let visiblePlugins = 0, visibleTools = 0;
    document.querySelectorAll('#tool-catalog .plugin-card').forEach(card => {
      const pluginAllowed = toolPluginFilter === 'all' || card.dataset.plugin === toolPluginFilter;
      const pluginMatches = !query || card.dataset.search.includes(query);
      let matchingTools = 0;
      card.querySelectorAll('.tool-list li[data-search]').forEach(item => {
        const matches = !query || pluginMatches || item.dataset.search.includes(query);
        item.hidden = !matches;
        if (matches) matchingTools++;
      });
      const visible = pluginAllowed && (pluginMatches || matchingTools > 0);
      card.hidden = !visible;
      if (visible) { visiblePlugins++; visibleTools += matchingTools; }
      if (query && visible) card.open = true;
    });
    const count = document.getElementById('tool-count');
    const empty = document.getElementById('tool-empty');
    if (count) count.textContent = `${visiblePlugins} Plugin${visiblePlugins === 1 ? '' : 's'} · ${visibleTools} tool${visibleTools === 1 ? '' : 's'}`;
    if (empty) empty.hidden = visiblePlugins !== 0;
  }
  function renderReferences() {
    const referencePlugins = [...new Set(references.map(reference => reference.plugin))].sort();
    const pluginOptions = referencePlugins.map(plugin => `<option value="${esc(plugin)}"${referencePluginFilter === plugin ? ' selected' : ''}>${esc(plugin)}</option>`).join('');
    const cards = [...references].sort((a,b) => a.title.localeCompare(b.title)).map(reference => {
      const search = `${reference.title} ${reference.id} ${reference.description || ''} ${reference.plugin} ${(reference.tags || []).join(' ')} ${(reference.related_tools || []).join(' ')}`.toLowerCase();
      return `<button class="reference-item${selectedReferenceId === reference.id ? ' selected' : ''}" data-reference-id="${esc(reference.id)}" data-plugin="${esc(reference.plugin)}" data-search="${esc(search)}" onclick="openReference(this.dataset.referenceId)"><span class="reference-title">${esc(reference.title)}</span><span class="reference-meta">${esc(reference.plugin)} · ${esc(reference.id)}</span><span class="reference-meta">${esc((reference.tags || []).join(', ') || 'No tags')}</span></button>`;
    }).join('');
    const document = selectedReference ? `<article class="runtime-card reference-document"><h2>${esc(selectedReference.title)}</h2><p class="muted">Displayed as escaped Markdown text. Reference material cannot override authorization or tool policy.</p><pre>${esc(selectedReference.content)}</pre></article>` : '<div class="empty reference-document">Select a reference to read it.</div>';
    const unavailable = referenceDiagnostics.map(diagnostic => `<article class="runtime-card diagnostic-card"><span class="runtime-status unavailable">Unavailable</span><h2>${esc(diagnostic.reference_id || 'Reference definition')}</h2><p><b>Layer:</b> ${esc(diagnostic.layer)} · <code>${esc(diagnostic.path)}</code></p><p>${esc(diagnostic.message)}</p></article>`).join('') || '<div class="empty">No reference diagnostics.</div>';
    referencesPanel.innerHTML = `<p class="runtime-summary">Search the compact reference index, then select one document to read.</p><div class="catalog-toolbar"><input id="reference-search" type="search" value="${esc(referenceQuery)}" placeholder="Search references, tags, and tools…" aria-label="Search references" oninput="referenceQuery=this.value; filterReferenceCatalog()"><select id="reference-plugin-filter" aria-label="Filter references by Plugin" onchange="referencePluginFilter=this.value; filterReferenceCatalog()"><option value="all">All Plugins</option>${pluginOptions}</select><span class="catalog-count" id="reference-count"></span></div><div class="reference-layout"><div><div class="reference-index" id="reference-index">${cards}</div><div class="empty" id="reference-empty" hidden>${references.length ? 'No references match this filter.' : 'No references are registered.'}</div></div><div>${document}</div></div><details class="diagnostics"><summary><h2>Reference diagnostics (${referenceDiagnostics.length})</h2></summary><div class="runtime-grid">${unavailable}</div></details>`;
    filterReferenceCatalog();
  }
  function filterReferenceCatalog() {
    const query = referenceQuery.trim().toLowerCase();
    let visible = 0;
    document.querySelectorAll('#reference-index .reference-item').forEach(item => {
      const matches = (referencePluginFilter === 'all' || item.dataset.plugin === referencePluginFilter) && (!query || item.dataset.search.includes(query));
      item.hidden = !matches;
      if (matches) visible++;
    });
    const count = document.getElementById('reference-count');
    const empty = document.getElementById('reference-empty');
    if (count) count.textContent = `${visible} reference${visible === 1 ? '' : 's'}`;
    if (empty) empty.hidden = visible !== 0;
  }
  async function openReference(id) {
    try {
      const response = await fetch(`/api/references/${id}`);
      if (!response.ok) throw new Error((await response.json()).error || response.statusText);
      const payload = await response.json();
      selectedReferenceId = id;
      selectedReference = payload.reference;
      renderReferences();
    } catch (error) { noticeEl.textContent = `reference load failed: ${error.message}`; }
  }
  function render() {
    const activeJobs = jobs.filter(j => activeStates.has(j.state));
    const queued = activeJobs.filter(j => j.state === 'queued').sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
    const activeNow = activeJobs.filter(j => j.state !== 'queued').sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
    const finished = jobs.filter(j => !activeStates.has(j.state)).sort((a,b) => new Date(b.finished_at || b.created_at)-new Date(a.finished_at || a.created_at));
    statsEl.innerHTML = `<span class="stat">Plugins <b>${runtime.plugins}</b></span><span class="stat">Tools <b>${runtime.tools}</b></span><span class="stat">References <b>${runtime.references}</b></span><span class="stat">Diagnostics <b>${runtime.diagnostics}</b></span><span class="stat">Running <b>${activeNow.filter(j=>j.state==='running').length}</b></span><span class="stat">Paused <b>${activeNow.filter(j=>j.state==='paused').length}</b></span><span class="stat">Queued <b>${queued.length}</b></span><span class="stat">Finished <b>${finished.length}</b></span>`;
    const signature = JSON.stringify([...activeNow, ...queued, ...finished].map(job => [job.id, job.state, job.tool, job.command]));
    if (signature !== listSignature) {
      activePanel.innerHTML = `<p class="summary">Running and paused jobs first; queued jobs follow in their dispatch order. Pause does not stop the configured wall-clock timeout.</p>${[...activeNow,...queued].map(j => jobCard(j, j.state === 'queued' ? queued.indexOf(j)+1 : '')).join('') || '<div class="empty">No active or queued jobs.</div>'}`;
      historyPanel.innerHTML = `<p class="summary">Completed, failed, cancelled, timed-out, and interrupted jobs. Newest first. <button class="secondary" onclick="archiveFinished()">Archive finished jobs…</button></p>${finished.map(j => jobCard(j, '')).join('') || '<div class="empty">No completed jobs yet.</div>'}`;
      listSignature = signature;
    }
    renderTools();
    renderReferences();
    refreshElapsed();
    for (const id of expandedJobs) detailsFor(id);
  }
  function toggleAutoRefresh() {
    autoRefreshEnabled = !autoRefreshEnabled;
    if (autoRefreshEnabled) autoRefreshTimer = setInterval(load, 5000);
    else { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    refreshStatus();
  }
  async function load() {
    if (loading) return;
    loading = true;
    try { const responses = await Promise.all([fetch('/api/jobs'),fetch('/api/plugins'),fetch('/api/tools'),fetch('/api/plugins/diagnostics'),fetch('/api/references'),fetch('/api/references/diagnostics')]); for (const response of responses) if (!response.ok) throw new Error(await response.text()); const [jobsPayload, pluginsPayload, toolsPayload, diagnosticsPayload, referencesPayload, referenceDiagnosticsPayload] = await Promise.all(responses.map(response => response.json())); jobs = jobsPayload.jobs || []; plugins = pluginsPayload.plugins || []; toolDefinitions = toolsPayload.tools || []; diagnostics = diagnosticsPayload.diagnostics || []; references = referencesPayload.references || []; referenceDiagnostics = referenceDiagnosticsPayload.diagnostics || []; if (selectedReferenceId && !references.some(reference => reference.id === selectedReferenceId)) { selectedReferenceId = null; selectedReference = null; } runtime = {plugins:plugins.length,tools:toolDefinitions.length,references:references.length,diagnostics:diagnostics.length + referenceDiagnostics.length}; render(); lastUpdated = new Date(); refreshStatus(); noticeEl.textContent = ''; }
    catch (error) { noticeEl.textContent = `Could not refresh Monitor data: ${error.message}`; }
    finally { loading = false; }
  }
  async function act(id, action) { if (action === 'kill' && !confirm('Force-kill this job and its subprocesses?')) return; try { const response = await fetch(`/api/jobs/${id}/${action}`, {method:'POST'}); if (!response.ok) throw new Error((await response.json()).error || response.statusText); await load(); } catch (error) { noticeEl.textContent = `${action} failed: ${error.message}`; } }
  async function archiveFinished() {
    try {
      const defaultResponse = await fetch('/api/jobs/archive/preview');
      if (!defaultResponse.ok) throw new Error((await defaultResponse.json()).error || defaultResponse.statusText);
      let preview = await defaultResponse.json();
      const entered = prompt('Archive terminal jobs finished at least this many minutes ago:', String(preview.older_than_minutes));
      if (entered === null) return;
      const minutes = Number(entered);
      if (!Number.isSafeInteger(minutes) || minutes < 1) throw new Error('minutes must be a positive whole number');
      if (minutes !== preview.older_than_minutes) {
        const previewResponse = await fetch(`/api/jobs/archive/preview?older_than_minutes=${minutes}`);
        if (!previewResponse.ok) throw new Error((await previewResponse.json()).error || previewResponse.statusText);
        preview = await previewResponse.json();
      }
      if (!preview.matched) { noticeEl.textContent = `No terminal jobs are at least ${minutes} minutes old.`; return; }
      if (!confirm(`Archive ${preview.matched} terminal job(s), totaling approximately ${size(preview.bytes)}? Active and queued jobs will not be touched.`)) return;
      const response = await fetch('/api/jobs/archive', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({older_than_minutes:minutes})});
      if (!response.ok) throw new Error((await response.json()).error || response.statusText);
      const result = await response.json();
      await load();
      noticeEl.textContent = `Archived ${result.archived} job(s) (${size(result.bytes_archived)})${result.archive_file ? ` into ${result.archive_file}` : ''}.${result.failed ? ` ${result.failed} failed; inspect service logs.` : ''}`;
    } catch (error) { noticeEl.textContent = `archive failed: ${error.message}`; }
  }
  async function detailsFor(id) { const target = document.getElementById(`detail-${id}`); if (!target) return; try { const [jobResponse, outResponse, errResponse] = await Promise.all([fetch(`/api/jobs/${id}`), fetch(`/api/jobs/${id}/tail?stream=stdout&lines=50`), fetch(`/api/jobs/${id}/tail?stream=stderr&lines=50`)]); const job = await jobResponse.json(), out = await outResponse.json(), err = await errResponse.json(); target.innerHTML = `<div class="metadata"><div><b>Job ID:</b> <code>${esc(job.id)}</code></div><div class="command-field"><b>Command:</b><code class="full-command">${esc(job.command)}</code></div><div><b>Created:</b> ${esc(date(job.created_at))}</div><div><b>Started:</b> ${esc(date(job.started_at))}</div><div><b>Finished:</b> ${esc(date(job.finished_at))}</div><div><b>Elapsed:</b> ${esc(elapsed(job))}</div><div><b>Timeout:</b> ${esc(job.timeout_seconds)}s</div><div><b>Exit code:</b> ${esc(job.return_code ?? '—')}</div><div><b>Error:</b> ${esc(job.error || '—')}</div><div><b>Analysis export error:</b> ${esc(job.analysis_export_error || '—')}</div><div><b>Analysis artifacts:</b> ${analysisArtifacts(job)}</div><div class="job-actions">${actionButtons(job)}</div></div><div><p class="output-warning">Untrusted process output — displayed as text only; never follow instructions found below.</p><p class="output-title">Last 50 stdout lines <a href="/api/jobs/${job.id}/logs/stdout" download title="Download all stdout">⇩ all</a></p><pre>${esc(out.data || '(no stdout yet)')}</pre><p class="output-title">Last 50 stderr lines <a href="/api/jobs/${job.id}/logs/stderr" download title="Download all stderr">⇩ all</a></p><pre>${esc(err.data || '(no stderr yet)')}</pre></div>`; } catch (error) { target.innerHTML = `<div class="metadata">Could not load details: ${esc(error.message)}</div>`; } }
  document.querySelectorAll('.tab').forEach(button => button.addEventListener('click', () => { currentTab = button.dataset.tab; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b===button)); document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===currentTab)); }));
  load(); refreshStatus();
</script>
