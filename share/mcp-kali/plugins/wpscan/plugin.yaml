apiVersion: mcp-kali/v1
kind: Plugin
metadata:
  id: org.mcp-kali.wpscan
  name: WPScan
  version: 1.0.0
categories: [web-application, vulnerability-analysis]
requires:
  commands: [wpscan]
tools:
  - metadata:
      name: wpscan_web_scan
      description: Assess an authorized WordPress site.
    input_schema:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url: {type: string, minLength: 1, maxLength: 65536}
    execution:
      program: wpscan
      args: [--url, "{{url}}"]
