apiVersion: mcp-kali/v1
kind: Plugin
metadata:
  id: org.mcp-kali.sqlmap
  name: SQLmap
  version: 1.0.0
categories: [web-application]
tags: [injection]
requires:
  commands: [sqlmap]
tools:
  - metadata:
      name: sqlmap_parameter_test
      description: Test an authorized URL for SQL injection behavior.
    input_schema:
      type: object
      additionalProperties: false
      required: [url]
      properties:
        url: {type: string, minLength: 1, maxLength: 65536}
        data: {type: string, minLength: 1, maxLength: 65536}
    execution:
      program: sqlmap
      args:
        - -u
        - "{{url}}"
        - --batch
        - when: data
          args: [--data, "{{data}}"]
